services:
  - type: web
    name: my-wealth-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://my-wealth-web.onrender.com
      - key: ANTHROPIC_MODEL
        value: claude-3-5-sonnet-20241022

  - type: web
    name: my-wealth-web
    runtime: static
    rootDir: mobile
    buildCommand: npm ci && npx expo export --platform web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_BASE_URL
        value: https://my-wealth-api-chky.onrender.com/api/v1
